<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付订单 - 数字商店</title>
    <style>
        :root {
            --bg: #0b0d10;
            --panel: rgba(17, 21, 27, 0.94);
            --line: rgba(180, 192, 205, 0.14);
            --line-strong: rgba(220, 231, 243, 0.22);
            --text: #eef4fb;
            --text-soft: #b6c2cf;
            --text-dim: #728092;
            --accent: #c7ff6b;
            --success: #79f2aa;
            --danger: #ff857f;
            --warn: #ffd86a;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            --radius: 26px;
            --radius-sm: 18px;
            --max-width: 720px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(199, 255, 107, 0.07), transparent 26%),
                radial-gradient(circle at 85% 14%, rgba(125, 211, 252, 0.07), transparent 24%),
                linear-gradient(180deg, #090b0e 0%, #0d1014 45%, #090b0e 100%);
            color: var(--text);
            font-family: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono", "Fira Code", "Menlo", monospace;
            line-height: 1.7;
        }

        a { color: inherit; text-decoration: none; }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: rgba(9, 11, 14, 0.72);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .site-header-inner {
            width: min(calc(100% - 32px), var(--max-width));
            margin: 0 auto;
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-soft);
            font-size: 0.82rem;
            padding: 0.7rem 0.95rem;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: 0.22s ease;
        }

        .back-link:hover {
            color: var(--text);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-mark {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 14px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line-strong);
            background: linear-gradient(180deg, rgba(199, 255, 107, 0.16), rgba(199, 255, 107, 0.04));
            color: var(--accent);
        }

        .logo-text {
            font-size: 0.94rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .page-shell {
            width: min(calc(100% - 32px), var(--max-width));
            margin: 0 auto;
            padding: 2.4rem 0 4rem;
        }

        /* Steps bar */
        .steps-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 1.75rem;
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18, 22, 28, 0.95), rgba(10, 13, 18, 0.98));
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .step-circle {
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            display: grid;
            place-items: center;
            font-size: 0.82rem;
            font-weight: 700;
            border: 2px solid var(--line);
            color: var(--text-dim);
            background: transparent;
            flex-shrink: 0;
        }

        .step-circle.active {
            border-color: var(--accent);
            background: rgba(199, 255, 107, 0.15);
            color: var(--accent);
        }

        .step-circle.done {
            border-color: var(--success);
            background: rgba(121, 242, 170, 0.15);
            color: var(--success);
        }

        .step-label {
            font-size: 0.82rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .step-label.active { color: var(--accent); font-weight: 600; }
        .step-label.done { color: var(--success); }

        .step-line {
            width: 3.5rem;
            height: 2px;
            background: var(--line);
            margin: 0 0.6rem;
            flex-shrink: 0;
        }

        .step-line.done { background: var(--success); }

        /* Terminal window */
        .terminal-window {
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18, 22, 28, 0.95), rgba(10, 13, 18, 0.98));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .window-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
        }

        .window-controls { display: flex; gap: 0.4rem; }
        .window-dot { width: 0.68rem; height: 0.68rem; border-radius: 999px; }
        .window-dot:nth-child(1) { background: #ff6e68; }
        .window-dot:nth-child(2) { background: #ffd86a; }
        .window-dot:nth-child(3) { background: #68f29a; }

        .window-title {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .pay-body {
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .pay-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .order-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.5rem 1.2rem;
            text-align: left;
            max-width: 380px;
            margin: 0 auto 1.75rem;
            padding: 1.1rem 1.3rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
        }

        .order-info-label {
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        .order-info-value {
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 600;
            text-align: right;
        }

        .order-info-value.amount {
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* QR area */
        .qr-area {
            margin: 0 auto 1.5rem;
            max-width: 260px;
            padding: 1.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            background: #fff;
        }

        .qr-area img,
        .qr-area canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .qr-hint {
            margin-top: 0.75rem;
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        /* Timer */
        .timer-bar {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.65rem 1.2rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 216, 106, 0.18);
            background: rgba(255, 216, 106, 0.08);
            color: var(--warn);
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .timer-bar.expired {
            border-color: rgba(255, 133, 127, 0.18);
            background: rgba(255, 133, 127, 0.08);
            color: var(--danger);
        }

        /* Status */
        .status-msg {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(199, 255, 107, 0.2);
            border-top-color: var(--accent);
            border-radius: 999px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Success state */
        .success-panel {
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .success-icon {
            width: 3.5rem;
            height: 3.5rem;
            margin: 0 auto 1rem;
            border-radius: 999px;
            background: rgba(121, 242, 170, 0.15);
            border: 2px solid var(--success);
            display: grid;
            place-items: center;
            color: var(--success);
            font-size: 1.5rem;
        }

        .success-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        .success-sub {
            color: var(--text-soft);
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid rgba(199, 255, 107, 0.18);
            background: rgba(199, 255, 107, 0.12);
            color: var(--accent);
            cursor: pointer;
            transition: 0.22s ease;
            font: inherit;
        }

        .btn-home:hover {
            transform: translateY(-1px);
            background: rgba(199, 255, 107, 0.18);
        }

        /* Test mode button */
        .btn-test-pay {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.65rem 1.3rem;
            border-radius: 999px;
            border: 1px solid rgba(121, 242, 170, 0.2);
            background: rgba(121, 242, 170, 0.1);
            color: var(--success);
            cursor: pointer;
            transition: 0.22s ease;
            font: inherit;
            font-size: 0.88rem;
        }

        .btn-test-pay:hover {
            transform: translateY(-1px);
            background: rgba(121, 242, 170, 0.16);
        }

        .loading-state {
            padding: 4rem 1.5rem;
            text-align: center;
            color: var(--text-dim);
        }

        .loading-spinner {
            width: 42px;
            height: 42px;
            margin: 0 auto 1rem;
            border-radius: 999px;
            border: 3px solid rgba(199, 255, 107, 0.12);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }

        @media (max-width: 720px) {
            .site-header-inner { min-height: 60px; }

            .page-shell {
                width: min(calc(100% - 24px), var(--max-width));
                padding: 1.5rem 0 3rem;
            }

            .pay-body { padding: 1.2rem 1rem; }

            .pay-title { font-size: 1.1rem; margin-bottom: 1rem; }

            .order-info {
                grid-template-columns: auto 1fr;
                gap: 0.4rem 0.8rem;
                padding: 0.9rem 1rem;
                max-width: 100%;
            }

            .order-info-label { font-size: 0.78rem; }
            .order-info-value { font-size: 0.82rem; }

            /* 进度条适配 */
            .steps-bar {
                padding: 0.9rem 0.8rem;
                margin-bottom: 1.2rem;
            }

            .step-label { font-size: 0.72rem; }

            .step-line {
                width: 1.8rem;
                margin: 0 0.3rem;
            }

            .step-circle {
                width: 1.7rem;
                height: 1.7rem;
                font-size: 0.72rem;
            }

            .qr-area {
                max-width: 220px;
                padding: 1rem;
            }

            .qr-hint { font-size: 0.78rem; }

            .timer-bar {
                font-size: 0.8rem;
                padding: 0.55rem 1rem;
            }

            .status-msg { font-size: 0.78rem; }

            .btn-test-pay { font-size: 0.85rem !important; padding: 0.65rem 1.4rem !important; }

            .success-panel { padding: 1.5rem 1rem; }
            .success-title { font-size: 1.1rem; }
            .success-sub { font-size: 0.82rem; }

            .window-bar { padding: 0.75rem 1rem; }
        }

        @media (max-width: 380px) {
            .step-label { font-size: 0.65rem; }
            .step-line { width: 1.2rem; margin: 0 0.2rem; }
            .step-circle { width: 1.5rem; height: 1.5rem; font-size: 0.65rem; }
            .order-info { grid-template-columns: 1fr; gap: 0.3rem 0; }
            .order-info-value { text-align: left; }
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a href="/" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
        <a href="/" class="logo">
            <span class="logo-mark">></span>
            <span class="logo-text">数字商店</span>
        </a>
    </div>
</header>

<div class="page-shell" id="app">
    <div class="terminal-window">
        <div class="window-bar">
            <div class="window-controls">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-title">payment-loader</div>
        </div>
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div>加载订单信息...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const API = window.location.origin + '/api';
const orderNo = location.pathname.split('/payment/')[1]?.replace(/\/$/, '') || '';
const urlState = new URL(window.location.href);

let orderData = null;
let timerInterval = null;
let pollInterval = null;
let expireTime = null;
let accessToken = urlState.searchParams.get('t') || '';

function syncAccessTokenInUrl() {
    if (!accessToken) return;

    const nextUrl = new URL(window.location.href);
    if (nextUrl.searchParams.get('t') === accessToken) return;

    nextUrl.searchParams.set('t', accessToken);
    history.replaceState(null, '', `${nextUrl.pathname}${nextUrl.search}`);
}

function buildApiUrl(path) {
    const url = new URL(`${API}${path}`, window.location.origin);
    if (accessToken) {
        url.searchParams.set('t', accessToken);
    }
    return url.toString();
}

function buildSecureOrderUrl() {
    return `/order/${encodeURIComponent(orderNo)}?t=${encodeURIComponent(accessToken)}`;
}

async function init() {
    if (!orderNo) {
        showError('缺少订单号');
        return;
    }

    // Get order info from sessionStorage (set by product page on submit)
    const stored = sessionStorage.getItem('pendingOrder');
    if (stored) {
        try {
            orderData = JSON.parse(stored);
            sessionStorage.removeItem('pendingOrder');
            if (!accessToken && orderData?.accessToken) {
                accessToken = orderData.accessToken;
            }
        } catch (e) {}
    }

    if (!accessToken) {
        showError('订单链接缺少访问令牌，请返回商品页重新下单，或通过订单查询页查看订单。');
        return;
    }

    syncAccessTokenInUrl();

    // Also fetch from API for status
    try {
        const res = await fetch(buildApiUrl(`/orders/status/${encodeURIComponent(orderNo)}`));
        const apiData = await res.json();
        if (!res.ok) throw new Error(apiData.error || '订单不存在');

        orderData = { ...(orderData || {}), ...apiData, accessToken };

        if (apiData.status === 'paid') {
            if (apiData.deliveryType !== 'auto_recharge') {
                window.location.href = buildSecureOrderUrl();
                return;
            }
            renderSuccess(orderData);
            return;
        }

        if (apiData.status === 'expired') {
            showError('订单已过期，请重新下单');
            return;
        }

        if (apiData.status === 'cancelled') {
            showError('订单已取消');
            return;
        }

        renderPayment();
    } catch (e) {
        showError(e.message || '加载订单失败');
    }
}

let activeMethod = 'wechat'; // current display method

function renderPayment() {
    stopTimers();
    expireTime = orderData?.expiresAt ? new Date(orderData.expiresAt).getTime() : Date.now() + 30 * 60 * 1000;
    const isManual = orderData.manualMode;
    const payUrl = orderData.payUrl || orderData.codeUrl || '';
    const contactInfo = orderData.contactInfo || '';

    function getQrForMethod(method) {
        if (!isManual) return { qrHtml: payUrl ? '<canvas id="qrCanvas"></canvas>' : '<div style="padding:2rem;color:#333;font-size:0.88rem;">暂无收款码</div>', hint: '请扫码支付' };
        const qrImg = method === 'alipay' ? '/images/alipay-pay.jpg' : '/images/wechat-pay.jpg';
        const label = method === 'alipay' ? '支付宝' : '微信';
        return {
            qrHtml: `<img src="${qrImg}" alt="${label}收款码" style="width:100%;height:auto;">`,
            hint: `请使用${label}扫码转账 <strong style="color:var(--accent);">¥${parseFloat(orderData.amount || 0).toFixed(2)}</strong>`
        };
    }

    const qr = getQrForMethod(activeMethod);

    document.getElementById('app').innerHTML = `
        <!-- Steps bar: step 2 active -->
        <div class="steps-bar">
            <div class="step-item">
                <div class="step-circle done">&#10003;</div>
                <span class="step-label done">创建订单</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-item">
                <div class="step-circle active">2</div>
                <span class="step-label active">扫码支付</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item">
                <div class="step-circle">3</div>
                <span class="step-label">获取卡密</span>
            </div>
        </div>

        <div class="terminal-window">
            <div class="window-bar">
                <div class="window-controls">
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                </div>
                <div class="window-title">payment-gateway</div>
            </div>
            <div class="pay-body">
                <div class="pay-title">扫码支付</div>

                <div class="order-info">
                    <span class="order-info-label">订单号:</span>
                    <span class="order-info-value">${escHtml(orderNo)}</span>
                    <span class="order-info-label">商品:</span>
                    <span class="order-info-value">${escHtml(orderData.productName || '')}</span>
                    <span class="order-info-label">金额:</span>
                    <span class="order-info-value amount">¥${parseFloat(orderData.amount || 0).toFixed(2)}</span>
                </div>

                <!-- Payment method tabs -->
                ${isManual ? `
                <div style="display:flex;gap:0.5rem;justify-content:center;margin-bottom:1.2rem;">
                    <button onclick="switchMethod('wechat')" id="tabWechat" style="padding:0.6rem 1.2rem;border-radius:999px;border:1px solid ${activeMethod==='wechat'?'var(--success)':'var(--line)'};background:${activeMethod==='wechat'?'rgba(121,242,170,0.12)':'rgba(255,255,255,0.04)'};color:${activeMethod==='wechat'?'var(--success)':'var(--text-soft)'};cursor:pointer;font:inherit;font-size:0.88rem;transition:0.2s;">
                        微信支付
                    </button>
                    <button onclick="switchMethod('alipay')" id="tabAlipay" style="padding:0.6rem 1.2rem;border-radius:999px;border:1px solid ${activeMethod==='alipay'?'#1677ff':'var(--line)'};background:${activeMethod==='alipay'?'rgba(22,119,255,0.12)':'rgba(255,255,255,0.04)'};color:${activeMethod==='alipay'?'#5ba0ff':'var(--text-soft)'};cursor:pointer;font:inherit;font-size:0.88rem;transition:0.2s;">
                        支付宝
                    </button>
                </div>
                ` : ''}

                <div class="qr-area" id="qrArea">${qr.qrHtml}</div>
                <p class="qr-hint" id="qrHint">${qr.hint}</p>

                ${isManual ? `
                <button class="btn-test-pay" id="btnMarkPaid" onclick="markPaid()" style="margin-top:1.2rem;font-size:0.95rem;padding:0.75rem 1.8rem;">
                    我已支付
                </button>
                ${contactInfo ? `<p style="margin-top:0.8rem;color:var(--text-dim);font-size:0.78rem;">${escHtml(contactInfo)}</p>` : ''}
                ` : ''}
                <div id="stripeRow" style="margin-top:1rem;display:none;">
                    <div style="color:var(--text-dim);font-size:0.78rem;margin-bottom:0.5rem;">或用国际信用卡支付</div>
                    <button class="btn-test-pay" onclick="payWithStripe()" style="background:rgba(99,102,241,0.16);color:#a5b4fc;border-color:rgba(99,102,241,0.4);">
                        💳 Stripe 信用卡支付
                    </button>
                </div>

                <div style="margin-top:1.2rem;">
                    <div class="timer-bar" id="timerBar">
                        <span>&#9201;</span>
                        <span>订单将在 <span id="countdown">30:00</span> 后过期</span>
                    </div>
                </div>

                <div class="status-msg" id="statusMsg">
                    <div class="spinner"></div>
                    <span>等待支付中...</span>
                </div>
            </div>
        </div>
    `;

    // Generate QR code for SDK mode
    if (!isManual && payUrl) {
        const canvas = document.getElementById('qrCanvas');
        if (canvas && typeof QRCode !== 'undefined') {
            QRCode.toCanvas(canvas, payUrl, { width: 220, margin: 2 });
        }
    }

    startTimer();
    startPolling();

    // 根据 /api/config/public 中的 stripeEnabled 决定是否显示 Stripe 按钮
    fetch('/api/config/public').then(r => r.json()).then(c => {
        if (c.stripeEnabled) {
            const row = document.getElementById('stripeRow');
            if (row) row.style.display = 'block';
        }
    }).catch(() => {});
}

async function payWithStripe() {
    try {
        const accessToken = new URL(location.href).searchParams.get('t') || '';
        const resp = await fetch(`/api/orders/stripe-checkout/${encodeURIComponent(orderNo)}?t=${encodeURIComponent(accessToken)}`, {
            method: 'POST'
        });
        const data = await resp.json();
        if (!resp.ok) {
            alert(data.error || 'Stripe 会话创建失败');
            return;
        }
        if (data.url) location.href = data.url;
    } catch (err) {
        console.error(err);
        alert('无法启动 Stripe 支付');
    }
}

function switchMethod(method) {
    activeMethod = method;
    renderPayment();
}

function renderSuccess(data) {
    const d = data || orderData;
    const isRecharge = d?.deliveryType === 'auto_recharge';
    const successMsg = isRecharge
        ? '充值请求已提交，系统正在为你的 ChatGPT 账号充值。结果将发送至你的邮箱。'
        : '卡密已发送到您的邮箱，请注意查收。';
    const step3Label = isRecharge ? '自动充值' : '获取卡密';

    document.getElementById('app').innerHTML = `
        <!-- Steps bar: all done -->
        <div class="steps-bar">
            <div class="step-item">
                <div class="step-circle done">&#10003;</div>
                <span class="step-label done">创建订单</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-item">
                <div class="step-circle done">&#10003;</div>
                <span class="step-label done">扫码支付</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-item">
                <div class="step-circle done">&#10003;</div>
                <span class="step-label done">${step3Label}</span>
            </div>
        </div>

        <div class="terminal-window">
            <div class="window-bar">
                <div class="window-controls">
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                </div>
                <div class="window-title">payment-success</div>
            </div>
            <div class="success-panel">
                <div class="success-icon">&#10003;</div>
                <div class="success-title">支付成功！</div>
                <p class="success-sub">${successMsg}</p>

                <div class="order-info" style="margin-bottom:1.5rem;">
                    <span class="order-info-label">订单号:</span>
                    <span class="order-info-value">${escHtml(orderNo)}</span>
                    <span class="order-info-label">商品:</span>
                    <span class="order-info-value">${escHtml(d?.productName || '')}</span>
                    <span class="order-info-label">金额:</span>
                    <span class="order-info-value amount">¥${parseFloat(d?.amount || 0).toFixed(2)}</span>
                </div>

                ${isRecharge ? '<div id="rechargeStatusArea" style="margin-bottom:1.2rem;"><div class="status-msg"><div class="spinner"></div><span>充值处理中，请稍候...</span></div></div>' : ''}

                <button class="btn-home" onclick="location.href='/'">返回首页</button>
            </div>
        </div>
    `;

    stopTimers();

    // 充值类订单继续轮询充值状态
    if (isRecharge) {
        pollRechargeStatus();
    }
}

function startTimer() {
    timerInterval = setInterval(() => {
        const remaining = Math.max(0, expireTime - Date.now());
        const min = Math.floor(remaining / 60000);
        const sec = Math.floor((remaining % 60000) / 1000);
        const el = document.getElementById('countdown');
        const bar = document.getElementById('timerBar');
        if (el) el.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;

        if (remaining <= 0) {
            if (bar) bar.classList.add('expired');
            if (el) el.textContent = '已过期';
            const msg = document.getElementById('statusMsg');
            if (msg) msg.innerHTML = '<span style="color:var(--danger);">订单已过期，请重新下单</span>';
            stopTimers();
        }
    }, 1000);
}

function startPolling() {
    let pollErrors = 0;
    pollInterval = setInterval(async () => {
        try {
            const res = await fetch(buildApiUrl(`/orders/status/${encodeURIComponent(orderNo)}`));
            if (!res.ok) { pollErrors++; if (pollErrors > 10) stopTimers(); return; }
            pollErrors = 0;
            const data = await res.json();
            if (data.status === 'paid') {
                stopTimers();
                if (data.deliveryType === 'auto_recharge') {
                    renderSuccess({ ...orderData, ...data });
                    return;
                }
                window.location.href = buildSecureOrderUrl();
                return;
            } else if (data.status === 'confirming') {
                const msg = document.getElementById('statusMsg');
                if (msg) msg.innerHTML = '<span style="color:var(--warn);">已提交，等待卖家确认收款...</span>';
            } else if (data.status === 'expired') {
                const msg = document.getElementById('statusMsg');
                if (msg) msg.innerHTML = '<span style="color:var(--danger);">订单已过期，请重新下单</span>';
                stopTimers();
            } else if (data.status === 'cancelled') {
                const msg = document.getElementById('statusMsg');
                if (msg) msg.innerHTML = '<span style="color:var(--danger);">订单已取消</span>';
                stopTimers();
            }
        } catch (e) {
            pollErrors++;
            if (pollErrors > 10) {
                stopTimers();
                const msg = document.getElementById('statusMsg');
                if (msg) msg.innerHTML = '<span style="color:var(--danger);">网络连接异常，请刷新页面重试</span>';
            }
        }
    }, 3000);
}

function stopTimers() {
    if (timerInterval) clearInterval(timerInterval);
    if (pollInterval) clearInterval(pollInterval);
}

async function pollRechargeStatus() {
    const rechargePoll = setInterval(async () => {
        try {
            const res = await fetch(buildApiUrl(`/orders/recharge-status/${encodeURIComponent(orderNo)}`));
            if (!res.ok) return;
            const data = await res.json();
            const area = document.getElementById('rechargeStatusArea');
            if (!area) { clearInterval(rechargePoll); return; }

            if (data.rechargeStatus === 'success') {
                area.innerHTML = '<div style="color:var(--success);font-weight:600;">充值成功！请查看你的 ChatGPT 账号。</div>';
                clearInterval(rechargePoll);
            } else if (data.rechargeStatus === 'failed') {
                area.innerHTML = '<div style="color:var(--danger);">充值失败，请联系客服处理。</div>';
                clearInterval(rechargePoll);
            }
        } catch (e) {}
    }, 5000);
}

async function markPaid() {
    const btn = document.getElementById('btnMarkPaid');
    if (btn) { btn.disabled = true; btn.textContent = '提交中...'; }

    try {
        const res = await fetch(buildApiUrl(`/orders/mark-paid/${encodeURIComponent(orderNo)}`), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ accessToken })
        });
        const data = await res.json();

        if (res.ok) {
            if (data.expiresAt) {
                orderData.expiresAt = data.expiresAt;
                expireTime = new Date(data.expiresAt).getTime();
            }
            if (btn) { btn.textContent = '已提交，等待确认'; btn.style.opacity = '0.6'; }
            const msg = document.getElementById('statusMsg');
            if (msg) msg.innerHTML = '<span style="color:var(--warn);">已提交，等待卖家确认收款...</span>';
        } else {
            alert(data.error || '提交失败');
            if (btn) { btn.disabled = false; btn.textContent = '我已支付'; }
        }
    } catch (e) {
        alert('网络错误，请重试');
        if (btn) { btn.disabled = false; btn.textContent = '我已支付'; }
    }
}

function showError(msg) {
    document.getElementById('app').innerHTML = `
        <div class="terminal-window">
            <div class="window-bar">
                <div class="window-controls">
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                    <span class="window-dot"></span>
                </div>
                <div class="window-title">error.log</div>
            </div>
            <div class="loading-state">
                <div style="font-size:2.2rem;margin-bottom:0.8rem;">!</div>
                <div style="color:var(--text);font-size:1rem;margin-bottom:0.5rem;">${escHtml(msg)}</div>
                <a href="/lookup" style="color:var(--accent);">前往订单查询</a>
            </div>
        </div>`;
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}
