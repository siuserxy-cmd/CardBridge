<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 数字商店</title>
    <style>
        :root {
            --bg: #0b0d10;
            --panel: rgba(17, 21, 27, 0.94);
            --panel-soft: rgba(255, 255, 255, 0.03);
            --panel-muted: #0f1318;
            --line: rgba(180, 192, 205, 0.14);
            --line-strong: rgba(220, 231, 243, 0.22);
            --text: #eef4fb;
            --text-soft: #b6c2cf;
            --text-dim: #728092;
            --accent: #c7ff6b;
            --accent-soft: rgba(199, 255, 107, 0.12);
            --success: #79f2aa;
            --danger: #ff857f;
            --warn: #ffd86a;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            --radius: 26px;
            --radius-sm: 18px;
            --max-width: 1120px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(199, 255, 107, 0.07), transparent 26%),
                radial-gradient(circle at 85% 14%, rgba(125, 211, 252, 0.07), transparent 24%),
                linear-gradient(180deg, #090b0e 0%, #0d1014 45%, #090b0e 100%);
            color: var(--text);
            font-family: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono", "Fira Code", "Menlo", "Monaco", "Consolas", monospace;
            line-height: 1.7;
        }

        a { color: inherit; text-decoration: none; }
        button, input { font: inherit; }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: rgba(9, 11, 14, 0.72);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .site-header-inner {
            width: min(calc(100% - 32px), var(--max-width));
            margin: 0 auto;
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-soft);
            font-size: 0.82rem;
            padding: 0.7rem 0.95rem;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: 0.22s ease;
        }

        .back-link:hover {
            color: var(--text);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-mark {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 14px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line-strong);
            background: linear-gradient(180deg, rgba(199, 255, 107, 0.16), rgba(199, 255, 107, 0.04));
            color: var(--accent);
        }

        .logo-text {
            font-size: 0.94rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .page-shell {
            width: min(calc(100% - 32px), var(--max-width));
            margin: 0 auto;
            padding: 2.4rem 0 4rem;
        }

        .terminal-window {
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18, 22, 28, 0.95), rgba(10, 13, 18, 0.98));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .window-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
        }

        .window-controls {
            display: flex;
            gap: 0.4rem;
        }

        .window-dot {
            width: 0.68rem;
            height: 0.68rem;
            border-radius: 999px;
        }

        .window-dot:nth-child(1) { background: #ff6e68; }
        .window-dot:nth-child(2) { background: #ffd86a; }
        .window-dot:nth-child(3) { background: #68f29a; }

        .window-title {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .detail-max {
            max-width: 720px;
            margin: 0 auto;
        }

        /* 进度条 */
        .steps-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 1.75rem;
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18, 22, 28, 0.95), rgba(10, 13, 18, 0.98));
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .step-circle {
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            display: grid;
            place-items: center;
            font-size: 0.82rem;
            font-weight: 700;
            border: 2px solid var(--line);
            color: var(--text-dim);
            background: transparent;
            flex-shrink: 0;
        }

        .step-circle.active {
            border-color: var(--accent);
            background: rgba(199, 255, 107, 0.15);
            color: var(--accent);
        }

        .step-circle.done {
            border-color: var(--success);
            background: rgba(121, 242, 170, 0.15);
            color: var(--success);
        }

        .step-label {
            font-size: 0.82rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .step-label.active {
            color: var(--accent);
            font-weight: 600;
        }

        .step-label.done {
            color: var(--success);
        }

        .step-line {
            width: 3.5rem;
            height: 2px;
            background: var(--line);
            margin: 0 0.6rem;
            flex-shrink: 0;
        }

        .step-line.done {
            background: var(--success);
        }

        .loading-state {
            padding: 4rem 1.5rem;
            text-align: center;
            color: var(--text-dim);
        }

        .loading-spinner {
            width: 42px;
            height: 42px;
            margin: 0 auto 1rem;
            border-radius: 999px;
            border: 3px solid rgba(199, 255, 107, 0.12);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .content-single {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .buy-card {
            display: flex;
            flex-direction: column;
        }

        .panel-body {
            padding: 1.45rem;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.1rem;
        }

        .product-title {
            font-size: clamp(1.6rem, 3.5vw, 2.5rem);
            line-height: 1.1;
            letter-spacing: -0.05em;
        }

        .status-badge {
            flex-shrink: 0;
            padding: 0.38rem 0.75rem;
            border-radius: 999px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid transparent;
        }

        .badge-in_stock {
            color: var(--success);
            background: rgba(121, 242, 170, 0.1);
            border-color: rgba(121, 242, 170, 0.16);
        }

        .badge-out_of_stock {
            color: var(--danger);
            background: rgba(255, 133, 127, 0.1);
            border-color: rgba(255, 133, 127, 0.16);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .stat-box {
            padding: 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stat-value {
            margin-top: 0.45rem;
            font-size: 1.55rem;
            line-height: 1;
            font-weight: 700;
        }

        .stat-value.price { color: var(--accent); }
        .stat-value.sold { color: var(--text); }
        .stat-value.stock { color: var(--warn); }

        .section-block {
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .section-title {
            margin-bottom: 0.75rem;
            color: var(--text-soft);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .tiers-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--panel-muted);
        }

        .tiers-table thead th {
            padding: 0.8rem 1rem;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.74rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tiers-table td {
            padding: 0.85rem 1rem;
            color: var(--text-soft);
            font-size: 0.88rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tiers-table tbody tr:first-child td {
            border-top: none;
        }

        .tiers-table tbody tr.active-tier {
            background: rgba(199, 255, 107, 0.08);
        }

        .tier-price {
            color: var(--accent);
            font-weight: 700;
        }

        .tier-discount {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            display: inline-block;
        }

        .tier-discount.hot {
            color: #ff857f;
            background: rgba(255, 133, 127, 0.12);
        }

        .tier-discount.warm {
            color: #ffd86a;
            background: rgba(255, 216, 106, 0.12);
        }

        .tier-discount.cool {
            color: var(--success);
            background: rgba(121, 242, 170, 0.12);
        }

        .tier-hint {
            margin-top: 0.65rem;
            color: var(--text-dim);
            font-size: 0.78rem;
        }

        .description {
            padding: 1rem 1.1rem;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--panel-muted);
            color: var(--text-soft);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .buy-body {
            padding: 1.4rem;
        }

        .buy-title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
            margin-bottom: 1rem;
        }

        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            margin-bottom: 0.45rem;
            color: var(--text-dim);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-input {
            width: 100%;
            min-height: 3rem;
            padding: 0.85rem 1rem;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            outline: none;
            transition: 0.22s ease;
        }

        .form-input:focus {
            border-color: rgba(199, 255, 107, 0.22);
            box-shadow: 0 0 0 4px rgba(199, 255, 107, 0.08);
        }

        .qty-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .total-display {
            min-height: 3rem;
            padding: 0.7rem 0.95rem;
            border-radius: 16px;
            border: 1px solid rgba(199, 255, 107, 0.18);
            background: rgba(199, 255, 107, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
        }

        .total-label {
            color: var(--text-soft);
            font-size: 0.82rem;
        }

        .total-value {
            color: var(--accent);
            font-size: 1.3rem;
            line-height: 1;
            font-weight: 700;
        }

        .pay-methods {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .pay-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            min-height: 3rem;
            padding: 0.85rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            transition: 0.22s ease;
        }

        .pay-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(199, 255, 107, 0.18);
            background: rgba(199, 255, 107, 0.1);
            color: var(--accent);
        }

        .pay-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .pay-icon { font-size: 1.2rem; }

        .info-tip {
            margin-top: 1rem;
            padding: 0.95rem 1rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 216, 106, 0.12);
            background: rgba(255, 216, 106, 0.08);
            color: var(--text-soft);
            font-size: 0.82rem;
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
        }

        .info-tip span {
            color: var(--warn);
            flex-shrink: 0;
        }

        @media (max-width: 980px) {
            .summary-title {
                max-width: none;
            }
        }

        @media (max-width: 720px) {
            .site-header-inner {
                min-height: 68px;
                flex-wrap: wrap;
                justify-content: space-between;
                padding: 0.55rem 0;
            }

            .summary-meta,
            .stats-grid,
            .qty-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a href="/" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回商品列表
        </a>
        <a href="/" class="logo">
            <span class="logo-mark">></span>
            <span class="logo-text">数字商店</span>
        </a>
    </div>
</header>

<div class="page-shell" id="app">
    <div class="terminal-window">
        <div class="window-bar">
            <div class="window-controls">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-title">product-loader</div>
        </div>
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div>加载中...</div>
        </div>
    </div>
</div>

<script>
const API = window.location.origin + '/api';

function getProductId() {
    const queryId = new URLSearchParams(window.location.search).get('id');
    if (queryId) return queryId;

    const pathId = location.pathname.split('/product/')[1]?.replace(/\/$/, '');
    return pathId || '';
}

const productId = getProductId();

let product = null;

function getUnitPrice(qty) {
    if (!product.tiers || !product.tiers.length) return product.price;
    for (let i = product.tiers.length - 1; i >= 0; i--) {
        const t = product.tiers[i];
        if (qty >= t.min_qty && (t.max_qty === null || qty <= t.max_qty)) {
            return t.price;
        }
    }
    return product.price;
}

async function loadProduct() {
    try {
        if (!productId) {
            throw new Error('缺少商品 ID');
        }

        const res = await fetch(`${API}/products/${productId}`);
        if (!res.ok) throw new Error('商品不存在');
        product = await res.json();

        document.title = `${product.name} - 数字商店`;
        renderPage();
    } catch (e) {
        document.getElementById('app').innerHTML = `
            <div class="terminal-window">
                <div class="window-bar">
                    <div class="window-controls">
                        <span class="window-dot"></span>
                        <span class="window-dot"></span>
                        <span class="window-dot"></span>
                    </div>
                    <div class="window-title">not-found.log</div>
                </div>
                <div class="loading-state">
                    <div style="font-size: 2.2rem; margin-bottom: 0.8rem;">404</div>
                    <div style="color: var(--text); font-size: 1rem; margin-bottom: 0.5rem;">商品不存在或已下架</div>
                    <a href="/" style="color: var(--accent);">返回首页</a>
                </div>
            </div>`;
    }
}

function renderPage() {
    const inStock = product.status === 'in_stock';
    const availableQty = product.stock || product.available_cards || 0;
    const maxQty = product.delivery_type === 'auto_recharge'
        ? Math.min(1, availableQty)
        : availableQty;

    let tiersHtml = '';
    if (product.tiers && product.tiers.length > 0) {
        const rows = product.tiers.map(t => {
            const qtyRange = t.max_qty ? `${t.min_qty} - ${t.max_qty} 件` : `${t.min_qty}+ 件`;
            const ratio = t.price / product.price;
            const pct = Math.round(ratio * 10);
            let discountHtml;
            if (ratio >= 1) {
                discountHtml = `<span style="color: var(--text-dim)">原价</span>`;
            } else {
                const cls = ratio <= 0.8 ? 'hot' : ratio <= 0.9 ? 'warm' : 'cool';
                discountHtml = `<span class="tier-discount ${cls}">${pct}折</span>`;
            }
            return `<tr data-min="${t.min_qty}" data-max="${t.max_qty ?? 99999}" data-price="${t.price}">
                <td>${qtyRange}</td>
                <td class="tier-price">¥${parseFloat(t.price).toFixed(2)}<span style="font-size:0.74rem;color:var(--text-dim)"> / 件</span></td>
                <td>${discountHtml}</td>
            </tr>`;
        }).join('');
        tiersHtml = `
        <div class="section-block">
            <p class="section-title">阶梯优惠</p>
            <table class="tiers-table">
                <thead><tr><th>购买数量</th><th>单价</th><th>优惠</th></tr></thead>
                <tbody id="tiersBody">${rows}</tbody>
            </table>
            <p class="tier-hint">购买数量越多，单价越优惠。</p>
        </div>`;
    }

    document.getElementById('app').innerHTML = `
        <div class="detail-max">
            <!-- 进度条 -->
            <div class="steps-bar">
                <div class="step-item">
                    <div class="step-circle active">1</div>
                    <span class="step-label active">创建订单</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <div class="step-circle">2</div>
                    <span class="step-label">扫码支付</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <div class="step-circle">3</div>
                    <span class="step-label">获取卡密</span>
                </div>
            </div>

            <div class="content-single">
                <!-- 商品标题 + 状态 + 三栏指标 -->
                <div class="terminal-window">
                    <div class="window-bar">
                        <div class="window-controls">
                            <span class="window-dot"></span>
                            <span class="window-dot"></span>
                            <span class="window-dot"></span>
                        </div>
                        <div class="window-title">product-details</div>
                    </div>
                    <div class="panel-body">
                        <div class="product-header">
                            <h2 class="product-title">${escHtml(product.name)}</h2>
                            <span class="status-badge badge-${product.status}">${inStock ? '有货' : '售罄'}</span>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-label">单价</div>
                                <div class="stat-value price" id="detailPrice">¥${parseFloat(product.price).toFixed(2)}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">已售</div>
                                <div class="stat-value sold">${product.sold_count || 0} <small style="font-size:0.8rem;">件</small></div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">库存</div>
                                <div class="stat-value stock">${maxQty} <small style="font-size:0.8rem;">件</small></div>
                            </div>
                        </div>

                        ${tiersHtml}

                        <div class="section-block">
                            <p class="section-title">商品描述</p>
                            <div class="description">${escHtml(product.description || '暂无描述')}</div>
                        </div>
                    </div>
                </div>

                <!-- 购买表单 -->
                <div class="terminal-window buy-card">
                    <div class="window-bar">
                        <div class="window-controls">
                            <span class="window-dot"></span>
                            <span class="window-dot"></span>
                            <span class="window-dot"></span>
                        </div>
                        <div class="window-title">checkout-panel</div>
                    </div>
                    <div class="buy-body">
                        <div class="buy-title">立即购买</div>

                        <div class="form-group">
                            <label class="form-label" for="buyerEmail">接收通知的邮箱地址</label>
                            <input class="form-input" type="email" id="buyerEmail"
                                placeholder="your@email.com" required autocomplete="email">
                        </div>

                        ${product.delivery_type === 'auto_recharge' ? `
                        <div class="form-group">
                            <label class="form-label" for="chatgptToken">ChatGPT Access Token</label>
                            <textarea class="form-input" id="chatgptToken" rows="3"
                                placeholder="粘贴你的 ChatGPT Access Token（从浏览器获取）"
                                style="resize:vertical;min-height:80px;" required></textarea>
                            <p style="margin-top:0.4rem;color:var(--text-dim);font-size:0.74rem;">
                                获取方式：登录 ChatGPT → 浏览器访问
                                <span style="color:var(--accent);cursor:pointer;text-decoration:underline;"
                                    onclick="window.open('https://chatgpt.com/api/auth/session','_blank')">
                                    chatgpt.com/api/auth/session
                                </span>
                                → 复制全部内容
                            </p>
                        </div>
                        ` : ''}

                        <div class="qty-row">
                            <div class="form-group" style="margin-bottom:0">
                                <label class="form-label" for="buyQty">购买数量</label>
                                <input class="form-input" type="number" id="buyQty"
                                    min="1" max="${maxQty}" value="1"
                                    oninput="updateTotal()" ${!inStock ? 'disabled' : product.delivery_type === 'auto_recharge' ? 'readonly' : ''}>
                            </div>
                            <div class="form-group" style="margin-bottom:0">
                                <label class="form-label">应付金额</label>
                                <div class="total-display">
                                    <span class="total-label">合计</span>
                                    <span class="total-value" id="totalPrice">¥${parseFloat(product.price).toFixed(2)}</span>
                                </div>
                            </div>
                        </div>

                        <div class="pay-methods">
                            <button class="pay-btn" onclick="submitOrder('alipay')" id="btnAlipay" ${!inStock ? 'disabled' : ''}>
                                <span class="pay-icon">💳</span> 支付宝支付
                            </button>
                            <button class="pay-btn" onclick="submitOrder('wechat')" id="btnWechat" ${!inStock ? 'disabled' : ''}>
                                <span class="pay-icon">💚</span> 微信支付
                            </button>
                        </div>

                        <div class="info-tip">
                            <span>!</span>
                            <div>${product.delivery_type === 'auto_recharge'
                                ? '付款成功后，系统将自动为你的 ChatGPT 账号充值。充值结果会发送到你的邮箱。Token 会加密存储，仅用于充值，任务完成后自动清除。'
                                : '付款成功后，卡密将自动发送到你填写的邮箱。请确认邮箱地址准确无误。'
                            }</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;

    updateTotal();
    highlightTier(1);
}

function updateTotal() {
    const qtyInput = document.getElementById('buyQty');
    let qty = parseInt(qtyInput?.value, 10) || 1;
    const max = parseInt(qtyInput?.max, 10) || 1;

    qty = Math.min(Math.max(1, qty), Math.max(1, max));
    if (qtyInput) qtyInput.value = String(qty);

    const unitPrice = getUnitPrice(qty);
    const total = (unitPrice * qty).toFixed(2);
    const detailPriceEl = document.getElementById('detailPrice');
    const totalEl = document.getElementById('totalPrice');
    if (detailPriceEl) detailPriceEl.textContent = `¥${parseFloat(unitPrice).toFixed(2)}`;
    if (totalEl) totalEl.textContent = `¥${total}`;
    highlightTier(qty);
}

function highlightTier(qty) {
    document.querySelectorAll('#tiersBody tr').forEach(row => {
        const min = parseInt(row.dataset.min);
        const max = parseInt(row.dataset.max);
        row.classList.toggle('active-tier', qty >= min && qty <= max);
    });
}

async function submitOrder(paymentMethod) {
    const email = document.getElementById('buyerEmail')?.value?.trim();
    const qty = parseInt(document.getElementById('buyQty')?.value) || 1;
    const chatgptTokenEl = document.getElementById('chatgptToken');
    const chatgptToken = chatgptTokenEl ? chatgptTokenEl.value.trim() : '';

    if (!email) {
        alert('请填写邮箱地址');
        document.getElementById('buyerEmail').focus();
        return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('邮箱格式不正确，请重新填写');
        return;
    }
    if (product.delivery_type === 'auto_recharge' && !chatgptToken) {
        alert('请粘贴你的 ChatGPT Access Token');
        chatgptTokenEl.focus();
        return;
    }

    ['btnAlipay', 'btnWechat'].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) { btn.disabled = true; btn.textContent = '处理中...'; }
    });

    try {
        const body = { productId: product.id, quantity: qty, email, paymentMethod };
        if (chatgptToken) body.chatgptToken = chatgptToken;

        const res = await fetch(`${API}/orders/guest-create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) {
            alert(data.error || '下单失败，请稍后重试');
            return;
        }

        // Save order data and redirect to payment page
        sessionStorage.setItem('pendingOrder', JSON.stringify({
            orderNo: data.orderNo,
            amount: data.amount,
            quantity: data.quantity,
            productName: data.productName,
            paymentMethod: paymentMethod,
            deliveryType: data.deliveryType || 'email',
            accessToken: data.accessToken || '',
            expiresAt: data.expiresAt || '',
            manualMode: data.paymentInfo?.manualMode || false,
            qrImage: data.paymentInfo?.qrImage || '',
            contactInfo: data.paymentInfo?.contactInfo || '',
            payUrl: data.paymentInfo?.payUrl || '',
            codeUrl: data.paymentInfo?.codeUrl || ''
        }));
        const securePaymentUrl = data.paymentUrl || `/payment/${encodeURIComponent(data.orderNo)}?t=${encodeURIComponent(data.accessToken || '')}`;
        window.location.href = securePaymentUrl;
    } catch (e) {
        console.error(e);
        alert('网络错误，请稍后重试');
    } finally {
        renderPage();
    }
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

loadProduct();
</script>

</body>
</html>
