<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单查询 - 数字商店</title>
    <style>
        :root {
            --bg: #0b0d10;
            --line: rgba(180, 192, 205, 0.14);
            --line-strong: rgba(220, 231, 243, 0.22);
            --text: #eef4fb;
            --text-soft: #b6c2cf;
            --text-dim: #728092;
            --accent: #c7ff6b;
            --success: #79f2aa;
            --danger: #ff857f;
            --warn: #ffd86a;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            --radius: 26px;
            --radius-sm: 18px;
            --max-width: 720px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(199,255,107,0.07), transparent 26%),
                radial-gradient(circle at 85% 14%, rgba(125,211,252,0.07), transparent 24%),
                linear-gradient(180deg, #090b0e 0%, #0d1014 45%, #090b0e 100%);
            color: var(--text);
            font-family: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono", "Fira Code", "Menlo", monospace;
            line-height: 1.7;
        }
        a { color: inherit; text-decoration: none; }
        .site-header {
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            background: rgba(9,11,14,0.72); border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .site-header-inner {
            width: min(calc(100% - 32px), var(--max-width)); margin: 0 auto; min-height: 76px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 0.6rem;
            color: var(--text-soft); font-size: 0.82rem; padding: 0.7rem 0.95rem;
            border-radius: 999px; border: 1px solid transparent; transition: 0.22s ease;
        }
        .back-link:hover { color: var(--text); border-color: var(--line); background: rgba(255,255,255,0.03); }
        .logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo-mark {
            width: 2.2rem; height: 2.2rem; border-radius: 14px;
            display: grid; place-items: center; border: 1px solid var(--line-strong);
            background: linear-gradient(180deg, rgba(199,255,107,0.16), rgba(199,255,107,0.04));
            color: var(--accent);
        }
        .logo-text { font-size: 0.94rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
        .page-shell { width: min(calc(100% - 32px), var(--max-width)); margin: 0 auto; padding: 2.4rem 0 4rem; }
        .terminal-window {
            border-radius: var(--radius); border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18,22,28,0.95), rgba(10,13,18,0.98));
            box-shadow: var(--shadow); overflow: hidden;
        }
        .window-bar {
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            padding: 0.95rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }
        .window-controls { display: flex; gap: 0.4rem; }
        .window-dot { width: 0.68rem; height: 0.68rem; border-radius: 999px; }
        .window-dot:nth-child(1) { background: #ff6e68; }
        .window-dot:nth-child(2) { background: #ffd86a; }
        .window-dot:nth-child(3) { background: #68f29a; }
        .window-title { color: var(--text-dim); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
        .lookup-body { padding: 2rem 1.5rem; }
        .lookup-title { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .lookup-sub { color: var(--text-dim); font-size: 0.88rem; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.45rem; color: var(--text-dim); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .form-input {
            width: 100%; min-height: 3rem; padding: 0.85rem 1rem;
            border-radius: 16px; border: 1px solid var(--line);
            background: rgba(255,255,255,0.03); color: var(--text); outline: none; transition: 0.22s ease;
        }
        .form-input:focus { border-color: rgba(199,255,107,0.22); box-shadow: 0 0 0 4px rgba(199,255,107,0.08); }
        .btn-search {
            width: 100%; min-height: 3rem; padding: 0.85rem 1rem; margin-top: 0.5rem;
            border-radius: 999px; border: 1px solid rgba(199,255,107,0.18);
            background: rgba(199,255,107,0.12); color: var(--accent);
            cursor: pointer; transition: 0.22s ease; font: inherit; font-weight: 600;
        }
        .btn-search:hover { transform: translateY(-1px); background: rgba(199,255,107,0.18); }
        .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #result { margin-top: 1.5rem; }
        .result-card {
            padding: 1.2rem; border-radius: var(--radius-sm);
            border: 1px solid var(--line); background: rgba(255,255,255,0.02);
        }
        .result-row { display: flex; justify-content: space-between; padding: 0.4rem 0; }
        .result-label { color: var(--text-dim); font-size: 0.82rem; }
        .result-value { color: var(--text); font-size: 0.88rem; font-weight: 600; }
        .result-value.paid { color: var(--success); }
        .result-value.pending { color: var(--warn); }
        .card-item {
            padding: 1rem; margin-top: 0.6rem; border-radius: 14px;
            border: 1px solid rgba(199,255,107,0.15); background: rgba(199,255,107,0.05);
        }
        .card-label { color: var(--text-dim); font-size: 0.72rem; margin-bottom: 0.3rem; }
        .card-value { font-family: monospace; font-size: 0.95rem; color: var(--accent); word-break: break-all; user-select: all; }
        .error-msg { color: var(--danger); font-size: 0.88rem; text-align: center; padding: 1rem; }
        @media (max-width: 720px) {
            .site-header-inner { min-height: 68px; }
            .lookup-body { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a href="/" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
        <a href="/" class="logo">
            <span class="logo-mark">></span>
            <span class="logo-text">数字商店</span>
        </a>
    </div>
</header>

<div class="page-shell">
    <div class="terminal-window">
        <div class="window-bar">
            <div class="window-controls"><span class="window-dot"></span><span class="window-dot"></span><span class="window-dot"></span></div>
            <div class="window-title">order-lookup</div>
        </div>
        <div class="lookup-body">
            <div class="lookup-title">订单查询</div>
            <p class="lookup-sub">输入下单时填写的邮箱和订单号，即可查询订单状态和卡密信息。</p>

            <form id="lookupForm" onsubmit="doLookup(event)">
                <div class="form-group">
                    <label class="form-label" for="email">邮箱地址</label>
                    <input class="form-input" type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="orderNo">订单号</label>
                    <input class="form-input" type="text" id="orderNo" placeholder="ORD..." required>
                </div>
                <button class="btn-search" type="submit" id="btnSearch">查询订单</button>
            </form>

            <div id="result"></div>
        </div>
    </div>
</div>

<script>
const API = window.location.origin + '/api';

async function doLookup(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const orderNo = document.getElementById('orderNo').value.trim();
    const btn = document.getElementById('btnSearch');
    const resultEl = document.getElementById('result');

    btn.disabled = true; btn.textContent = '查询中...';
    resultEl.innerHTML = '';

    try {
        const res = await fetch(`${API}/orders/lookup?email=${encodeURIComponent(email)}&orderNo=${encodeURIComponent(orderNo)}`);
        const data = await res.json();

        if (!res.ok) {
            resultEl.innerHTML = `<div class="error-msg">${esc(data.error || '查询失败')}</div>`;
            return;
        }

        const isPaid = data.status === 'paid';
        let cardsHtml = '';
        if (isPaid && data.cards && data.cards.length > 0) {
            cardsHtml = '<div style="margin-top:1rem;"><div style="color:var(--accent);font-size:0.82rem;font-weight:700;margin-bottom:0.5rem;">卡密内容</div>' +
                data.cards.map((c, i) => `
                    <div class="card-item">
                        <div class="card-label">第 ${i + 1} 张</div>
                        ${c.card_number ? `<div class="card-value">${esc(c.card_number)}</div>` : ''}
                        ${c.card_password ? `<div style="margin-top:0.3rem;"><span class="card-label">密码: </span><span class="card-value">${esc(c.card_password)}</span></div>` : ''}
                    </div>
                `).join('') + '</div>';
        }

        resultEl.innerHTML = `
            <div class="result-card">
                <div class="result-row"><span class="result-label">订单号</span><span class="result-value">${esc(data.orderNo)}</span></div>
                <div class="result-row"><span class="result-label">商品</span><span class="result-value">${esc(data.productName)}</span></div>
                <div class="result-row"><span class="result-label">数量</span><span class="result-value">${data.quantity} 件</span></div>
                <div class="result-row"><span class="result-label">金额</span><span class="result-value" style="color:var(--accent);">¥${parseFloat(data.amount).toFixed(2)}</span></div>
                <div class="result-row"><span class="result-label">状态</span><span class="result-value ${isPaid ? 'paid' : 'pending'}">${isPaid ? '已支付' : data.status === 'confirming' ? '待确认' : data.status === 'expired' ? '已过期' : data.status === 'cancelled' ? '已取消' : '待支付'}</span></div>
                <div class="result-row"><span class="result-label">下单时间</span><span class="result-value">${data.createdAt ? new Date(data.createdAt).toLocaleString() : '-'}</span></div>
                ${cardsHtml}
            </div>`;
    } catch (err) {
        resultEl.innerHTML = '<div class="error-msg">网络错误，请稍后重试</div>';
    } finally {
        btn.disabled = false; btn.textContent = '查询订单';
    }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
