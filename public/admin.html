<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 数字商店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #0f0a08 100%);
            color: #fef2f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 1rem 2rem;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }

        .btn-secondary {
            background: #334155;
            color: #cbd5e1;
        }

        .btn-secondary:hover {
            background: #475569;
            box-shadow: none;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f8fafc;
            font-size: 1rem;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #a855f7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        th {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">✦ 管理后台</div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <a href="/" style="color: #94a3b8; text-decoration: none;">返回前台</a>
                <span style="color: #94a3b8;" id="adminEmail"></span>
                <button onclick="changePassword()" style="padding:0.4rem 0.8rem;font-size:0.78rem;background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.2);border-radius:6px;cursor:pointer;">修改密码</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 统计数据 -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">加载中...</div>
        </div>

        <!-- 商品管理 -->
        <div class="section">
            <div class="section-title">
                商品管理
                <button class="btn" onclick="openAddProductModal()" style="float: right;">添加商品</button>
            </div>
            <table id="productsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>商品名称</th>
                        <th>价格</th>
                        <th>库存</th>
                        <th>交付方式</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="7" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- CDK 管理 -->
        <div class="section">
            <div class="section-title">CDK 管理</div>

            <!-- 导入 CDK -->
            <div style="background:#0f172a;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid rgba(148,163,184,0.1);">
                <h3 style="font-size:1rem;margin-bottom:1rem;">导入 CDK</h3>
                <textarea id="cdkImportText" class="form-textarea" placeholder="请输入 CDK 卡密，每行一个（16位字母数字）例如：ABCD1234EFGH5678" style="min-height:120px;margin-bottom:0.75rem;"></textarea>
                <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                    <span style="color:#94a3b8;font-size:0.82rem;">格式: 16位字母数字，不区分大小写</span>
                    <span style="color:#94a3b8;font-size:0.82rem;">导入类型:</span>
                    <select id="cdkImportType" class="form-input" style="width:auto;padding:0.5rem 1rem;">
                        <option value="monthly">月卡</option>
                        <option value="yearly">年卡</option>
                    </select>
                    <span style="color:#94a3b8;font-size:0.82rem;">商品:</span>
                    <select id="cdkImportProduct" class="form-input" style="width:auto;padding:0.5rem 1rem;"></select>
                    <button class="btn" onclick="importCDK()" style="margin-left:auto;">导入 CDK</button>
                </div>
            </div>

            <!-- CDK 列表 -->
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
                <span style="font-weight:600;">CDK 列表</span>
                <select id="cdkFilterType" class="form-input" style="width:auto;padding:0.4rem 0.8rem;font-size:0.82rem;" onchange="loadCDKList()">
                    <option value="all">全部类型</option>
                    <option value="monthly">月卡</option>
                    <option value="yearly">年卡</option>
                </select>
                <select id="cdkFilterStatus" class="form-input" style="width:auto;padding:0.4rem 0.8rem;font-size:0.82rem;" onchange="loadCDKList()">
                    <option value="all">全部状态</option>
                    <option value="available">可用</option>
                    <option value="sold">已用</option>
                </select>
            </div>
            <table id="cdkTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>CDK 卡密</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>订单</th>
                        <th>使用时间</th>
                        <th>错误信息</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="9" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 订单管理 -->
        <div class="section">
            <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.8rem;">
                <span>订单管理</span>
                <div style="display:flex;align-items:center;gap:0.6rem;font-size:0.82rem;">
                    <select onchange="filterOrders(this.value)" class="form-input" style="width:auto;padding:0.4rem 0.8rem;font-size:0.82rem;">
                        <option value="all">全部状态</option>
                        <option value="confirming">待确认</option>
                        <option value="paid">已支付</option>
                        <option value="pending">待支付</option>
                        <option value="cancelled">已取消</option>
                        <option value="expired">已过期</option>
                    </select>
                    <button onclick="exportOrders()" class="btn btn-secondary" style="padding:0.4rem 0.8rem;font-size:0.82rem;">导出CSV</button>
                </div>
            </div>
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>订单ID</th>
                        <th>用户</th>
                        <th>商品</th>
                        <th>金额</th>
                        <th>支付方式</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="7" class="loading">加载中...</td></tr>
                </tbody>
            </table>
            <div id="orderPagination" style="display:flex;align-items:center;gap:0.8rem;justify-content:center;padding:1rem 0;"></div>
        </div>
    </div>

    <!-- 添加商品模态框 -->
    <div class="modal" id="addProductModal">
        <div class="modal-content">
            <div class="modal-header">添加商品</div>
            <form id="addProductForm">
                <div class="form-group">
                    <label class="form-label">商品名称</label>
                    <input type="text" class="form-input" id="productName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">商品描述</label>
                    <textarea class="form-textarea" id="productDescription"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">价格（元）</label>
                    <input type="number" class="form-input" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">交付方式</label>
                    <select class="form-input" id="productDeliveryType">
                        <option value="email">邮件发卡（卡密通过邮件发送给买家）</option>
                        <option value="auto_recharge">自动充值（通过 ifaka API 自动充值到买家账号）</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="closeAddProductModal()">取消</button>
                    <button type="submit" class="btn">确定添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加卡密模态框 -->
    <div class="modal" id="addCardsModal">
        <div class="modal-content">
            <div class="modal-header">添加卡密</div>
            <p style="color: #94a3b8; margin-bottom: 1rem;">每行一张卡密，格式：卡号|密码（密码可选）</p>
            <form id="addCardsForm">
                <input type="hidden" id="cardsProductId">
                <div class="form-group">
                    <label class="form-label">卡密列表</label>
                    <textarea class="form-textarea" id="cardsText" placeholder="示例：&#10;CARD001|PASS001&#10;CARD002|PASS002&#10;CARD003" style="min-height: 200px;" required></textarea>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="closeAddCardsModal()">取消</button>
                    <button type="submit" class="btn">确定添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 编辑商品模态框 -->
    <div class="modal" id="editProductModal">
        <div class="modal-content">
            <div class="modal-header">编辑商品</div>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label class="form-label">商品名称</label>
                    <input type="text" class="form-input" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">商品描述</label>
                    <textarea class="form-textarea" id="editProductDescription"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">价格（元）</label>
                    <input type="number" class="form-input" id="editProductPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">交付方式</label>
                    <select class="form-input" id="editProductDeliveryType">
                        <option value="email">邮件发卡</option>
                        <option value="auto_recharge">自动充值</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="closeEditProductModal()">取消</button>
                    <button type="submit" class="btn">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/admin.js?v=20260404"></script>
</body>
</html>
