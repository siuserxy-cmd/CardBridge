services:
  - type: web
    name: digital-shop
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run init-db && npm run migrate-db && npm start
    autoDeployTrigger: commit
    disk:
      name: shop-data
      mountPath: /opt/render/project/src/database
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
