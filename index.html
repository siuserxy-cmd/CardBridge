<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字商店 - 优质数字商品售卖平台</title>
    <style>
        /* ============================================
           全局样式 - 蓝绿科技风格
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 深邃的暖色调背景 */
            background: linear-gradient(135deg, #1a0f0a 0%, #0f0a08 100%);
            color: #fef2f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ============================================
           导航栏 - 扁平透明设计
           ============================================ */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(26, 15, 10, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(249, 115, 22, 0.15);
            padding: 1.25rem 0;
        }

        .navbar-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            /* 橙红渐变文字 */
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, #f97316, #dc2626);
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: #f97316;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* ============================================
           Hero 区域 - 左右分栏布局
           ============================================ */
        .hero {
            margin-top: 80px;
            min-height: 500px;
            display: flex;
            align-items: center;
            padding: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰圆圈 */
        .hero::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-content {
            z-index: 1;
        }

        .hero-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 50px;
            color: #f97316;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
        }

        .stat-item {
            text-align: left;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #fb923c;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #64748b;
        }

        .hero-visual {
            position: relative;
            z-index: 1;
        }

        .visual-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .visual-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .visual-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }

        .visual-text {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* ============================================
           主内容区域
           ============================================ */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.3);
            border-radius: 50px;
            color: #fb923c;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 0.75rem;
        }

        .section-subtitle {
            font-size: 1.125rem;
            color: #64748b;
        }

        /* ============================================
           商品网格 - 卡片式布局
           ============================================ */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* 商品卡片 - 立体设计 */
        .product-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #f97316, #ea580c, #dc2626);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(249, 115, 22, 0.3);
            box-shadow:
                0 20px 60px rgba(249, 115, 22, 0.15),
                0 0 40px rgba(234, 88, 12, 0.1);
        }

        .card-content {
            padding: 2rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            flex: 1;
            line-height: 1.4;
        }

        /* 状态标签 */
        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.in_stock {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-badge.out_of_stock {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .card-description {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            /* 修复：添加标准属性 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 3rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .card-price-section {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .card-price {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-stock {
            color: #64748b;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stock-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fb923c;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 按钮 - 纯色设计 */
        .btn-buy {
            background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .btn-buy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.4);
        }

        .btn-buy:active {
            transform: translateY(0);
        }

        .btn-buy:disabled {
            background: rgba(51, 65, 85, 0.6);
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ============================================
           模态框样式
           ============================================ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.8);
            color: #cbd5e1;
            border: none;
            border-radius: 10px;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.9);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }

        .payment-options {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .payment-option {
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .payment-option:hover {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.08);
            transform: translateY(-2px);
        }

        /* ============================================
           页脚
           ============================================ */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            margin-top: 6rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        /* ============================================
           响应式设计
           ============================================ */
        @media (max-width: 1024px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 3rem;
            }

            .hero-visual {
                order: -1;
            }

            .hero-title {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 0;
            }

            .hero {
                margin-top: 70px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-stats {
                gap: 2rem;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .modal-content {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo" onclick="location.reload()">⚡ 数字商店</div>
            <div class="nav-links">
                <a href="#products" class="nav-link">商品中心</a>
                <a class="nav-link" id="userMenuBtn">登录/注册</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <div class="hero-tag">🚀 全新升级</div>
                <h1 class="hero-title">优质数字商品<br>即买即用</h1>
                <p class="hero-subtitle">专业的数字商品交易平台，提供ChatGPT、Claude等热门服务账号，自动发货，安全可靠。</p>
                <div class="hero-stats">
                    <div class="stat-item">
                        <div class="stat-number">1000+</div>
                        <div class="stat-label">成功订单</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">99.8%</div>
                        <div class="stat-label">好评率</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">24/7</div>
                        <div class="stat-label">在线服务</div>
                    </div>
                </div>
            </div>
            <div class="hero-visual">
                <div class="visual-card">
                    <div class="visual-icon">🎯</div>
                    <div class="visual-title">安全保障</div>
                    <div class="visual-text">所有商品经过严格审核，确保账号安全稳定，支持售后保障。</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 主内容区域 -->
    <main class="container" id="products">
        <div class="section-header">
            <div class="section-tag">🔥 热门商品</div>
            <h2 class="section-title">精选数字商品</h2>
            <p class="section-subtitle">严选优质商品，自动发货，即买即用</p>
        </div>

        <div class="product-grid" id="productGrid">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <!-- 登录/注册模态框 -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-header" id="authModalTitle">登录</div>
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label">邮箱地址</label>
                    <input type="email" class="form-input" id="authEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码（至少6位）</label>
                    <input type="password" class="form-input" id="authPassword" placeholder="••••••" required minlength="6">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">取消</button>
                    <button type="submit" class="btn-primary" id="authSubmitBtn">登录</button>
                </div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a class="nav-link" id="switchAuthMode" style="font-size: 0.9rem;">还没有账号？立即注册</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 支付方式选择模态框 -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <div class="modal-header">选择支付方式</div>
            <div id="paymentInfo" style="color: #cbd5e1; margin-bottom: 1.5rem; text-align: center;"></div>
            <div class="payment-options">
                <div class="payment-option" onclick="createOrder('alipay')">
                    <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">💳</div>
                    <div style="font-weight: 600; font-size: 1.1rem;">支付宝支付</div>
                </div>
                <div class="payment-option" onclick="createOrder('wechat')">
                    <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">💚</div>
                    <div style="font-weight: 600; font-size: 1.1rem;">微信支付</div>
                </div>
            </div>
            <div class="modal-buttons" style="margin-top: 2rem;">
                <button class="btn-secondary" onclick="closePaymentModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2025 数字商店 · 安全可靠的数字商品交易平台</p>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
